name: Deploy LIFF
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/liff/**'
      - '.github/workflows/deploy-liff.yml'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter liff build
        env:
          VITE_WORKER_URL: https://line-harness.line-harness-hiyo.workers.dev
          VITE_DEFAULT_LIFF_ID: ${{ vars.VITE_DEFAULT_LIFF_ID }}
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/liff
          command: pages deploy dist --project-name=line-crm-liff
