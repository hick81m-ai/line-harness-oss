name = "line-harness"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# ═══════════════════════════════════════════════════════════════
# デフォルト = テスト環境 (noda@)
# 使い方: npx wrangler deploy
# ═══════════════════════════════════════════════════════════════
account_id = "8daafeb8da4bb18c94591be424681ecd"

[assets]
directory = "dist/client"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "line-harness"
database_id = "23c995c1-edc6-47fe-9b2c-f725a8e971fa"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[triggers]
crons = ["*/5 * * * *", "0 */6 * * *"]

# ═══════════════════════════════════════════════════════════════
# 本番環境 (aiagent.mini@)
# 使い方: npx wrangler deploy --env production --name your-worker-name
# D1:     npx wrangler d1 execute line-crm --env production --remote --file ...
# ═══════════════════════════════════════════════════════════════
[env.production]
account_id = "YOUR_ACCOUNT_ID"

[env.production.assets]
directory = "dist/client"
binding = "ASSETS"

[[env.production.d1_databases]]
binding = "DB"
database_name = "line-crm"
database_id = "YOUR_D1_DATABASE_ID"

[[env.production.r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[env.production.triggers]
crons = ["*/5 * * * *", "0 */6 * * *"]
